<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3eee7">
  <title>{{ title or 'Diary & Wish' }}</title>
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('home') }}">Diary & Wish</a>
    <nav class="nav">
      <a href="{{ url_for('today') }}">今日</a>
      <a href="{{ url_for('calendar_page') }}">カレンダー</a>
      <a href="{{ url_for('wishes_page') }}">Wish</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
